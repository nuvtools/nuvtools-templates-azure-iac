# Adjust paths if your project structure differs from this example.
# =============================================================================

name: Reusable Deploy

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: 'Target environment (dev, staging, prod)'
      location:
        required: false
        type: string
        default: 'brazilsouth'
        description: 'Azure region for the deployment'
      resourceProviders:
        required: false
        type: string
        default: ''
        description: 'Space-separated Azure resource providers to register before deploy (e.g. "Microsoft.App Microsoft.ContainerRegistry"). Idempotent; leave empty to skip.'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    concurrency:
      group: deploy-${{ inputs.environment }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Azure CLI Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Resource providers must be registered on the subscription before their
      # resources can be created. Idempotent (returns immediately if already
      # registered). Requires the deploy identity to have */register/action
      # (included in Contributor).
      - name: Register resource providers
        if: inputs.resourceProviders != ''
        run: |
          for rp in ${{ inputs.resourceProviders }}; do
            echo "Registering $rp..."
            az provider register -n "$rp" --wait
          done

      - name: Validate template
        run: |
          az deployment sub validate \
            --location ${{ inputs.location }} \
            --template-file main.bicep \
            --parameters environments/${{ inputs.environment }}.bicepparam

      - name: What-If
        run: |
          az deployment sub what-if \
            --location ${{ inputs.location }} \
            --template-file main.bicep \
            --parameters environments/${{ inputs.environment }}.bicepparam

      - name: Deploy
        run: |
          az deployment sub create \
            --location ${{ inputs.location }} \
            --template-file main.bicep \
            --parameters environments/${{ inputs.environment }}.bicepparam \
            --name "deploy-${{ inputs.environment }}-$(date +%Y%m%d%H%M%S)"
