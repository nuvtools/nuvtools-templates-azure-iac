# =============================================================================
# Reference workflow — copy to your repo's .github/workflows/ to use.
# Manual dispatch. OIDC is read from environments/prod.bicepparam — no AZURE_* secrets.
# =============================================================================

name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      runDeploy:
        description: "Apply changes (uncheck for validate + what-if only)"
        type: boolean
        default: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      environment: prod
      runDeploy: ${{ inputs.runDeploy }}
