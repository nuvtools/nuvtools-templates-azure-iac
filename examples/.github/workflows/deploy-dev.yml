# =============================================================================
# Reference workflow — copy to your repo's .github/workflows/ to use.
# Adjust paths if your project structure differs from this example.
# =============================================================================

name: Deploy Dev

on:
  push:
    branches: [main]
    paths:
      - '**.bicep'
      - '**.bicepparam'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      environment: dev
    secrets: inherit
