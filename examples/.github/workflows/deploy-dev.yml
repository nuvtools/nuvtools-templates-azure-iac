# =============================================================================
# Reference workflow — copy to your repo's .github/workflows/ to use.
# Auto-deploys dev on push to main. Adjust paths if your structure differs.
# OIDC is read from environments/dev.bicepparam — no AZURE_* secrets needed.
# =============================================================================

name: Deploy Dev

on:
  push:
    branches: [main]
    paths:
      - '**.bicep'
      - '**.bicepparam'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      environment: dev
      # Register any providers your main.bicep needs, e.g. for Container Apps:
      # resourceProviders: 'Microsoft.App Microsoft.ContainerRegistry'
